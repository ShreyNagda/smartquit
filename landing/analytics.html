<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartQuit Analytics Dashboard</title>
    <link rel="icon" type="image/png" href="assets/favicon.ico" />
    <meta
      name="description"
      content="SmartQuit Analytics Dashboard - Real-time insights into smoking cessation program data"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <link rel="stylesheet" href="analytics.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <div class="header">
        <a href="index.html" class="back-button">
          <i data-lucide="chevron-left"></i>
        </a>
        <h1>SmartQuit Analytics</h1>
        <p>Real-time insights into your smoking cessation program</p>
      </div>

      <div class="analytics-grid">
        <div class="stat-card">
          <div class="stat-icon users">
            <i data-lucide="users"></i>
          </div>
          <div class="stat-value" id="totalUsers">-</div>
          <div class="stat-label">Total Users</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon entries">
            <i data-lucide="book-open"></i>
          </div>
          <div class="stat-value" id="totalEntries">-</div>
          <div class="stat-label">Journal Entries</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon average">
            <i data-lucide="trending-up"></i>
          </div>
          <div class="stat-value" id="avgEntries">-</div>
          <div class="stat-label">Avg. Entries per User</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon success">
            <i data-lucide="award"></i>
          </div>
          <div class="stat-value" id="milestoneCount">-</div>
          <div class="stat-label">Milestones Achieved</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon streak">
            <i data-lucide="calendar-check"></i>
          </div>
          <div class="stat-value" id="activeUsers">-</div>
          <div class="stat-label">Active Users (7 days)</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon recent">
            <i data-lucide="clock"></i>
          </div>
          <div class="stat-value" id="recentActivity">-</div>
          <div class="stat-label">Recent Activities (24h)</div>
        </div>
      </div>

      <div class="chart-section">
        <div class="chart-card">
          <h3 class="chart-title">Journal Entry Types Distribution</h3>
          <div class="chart-container">
            <canvas id="journalChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3 class="chart-title">Interventions Used by Users</h3>
          <div class="chart-container">
            <canvas id="interventionChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Firebase Configuration and Analytics Functions
      const firebaseConfig = {
        apiKey: "AIzaSyAvQqSH9sUyHqC19W0eXyjGFqDgAowFztM",
        authDomain: "smoking-cessation-78e14.firebaseapp.com",
        projectId: "smoking-cessation-78e14",
        storageBucket: "smoking-cessation-78e14.firebasestorage.app",
        messagingSenderId: "242383778526",
        appId: "1:242383778526:web:680c935f209e016b39c84f",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // Global chart instance variables
      let journalChartInstance = null;
      let interventionChartInstance = null;

      // Function to fetch total users and their profile creation dates
      async function getUsersData() {
        try {
          const usersSnapshot = await db.collection("users").get();
          console.log("Fetched users:", usersSnapshot.size);

          const users = [];
          const profileCreationDates = [];

          usersSnapshot.forEach((doc) => {
            const userData = doc.data();
            users.push({
              id: doc.id,
              ...userData,
            });

            // Extract profile creation date
            if (userData.createdAt) {
              const createdAt = userData.createdAt.toDate
                ? userData.createdAt.toDate()
                : new Date(userData.createdAt);
              profileCreationDates.push(createdAt);
            }
          });

          return {
            totalUsers: users.length,
            users: users,
            profileCreationDates: profileCreationDates,
          };
        } catch (error) {
          console.error("Error fetching users:", error);
          return { totalUsers: 0, users: [], profileCreationDates: [] };
        }
      }

      // Function to fetch all intervention data from users
      async function getAllInterventions() {
        try {
          const interventions = [];

          // Get all users first
          const usersSnapshot = await db.collection("users").get();

          usersSnapshot.forEach((userDoc) => {
            const userData = userDoc.data();

            // Debug: Log user data to see structure
            console.log(`User ${userDoc.id} data keys:`, Object.keys(userData));

            // Check the stats field specifically since it's present in the data
            if (userData.stats) {
              console.log(`User ${userDoc.id} stats data:`, userData.stats);
              console.log(
                `User ${userDoc.id} stats keys:`,
                Object.keys(userData.stats),
              );
            }

            // Check for various possible intervention field names, including stats
            const possibleInterventionFields = [
              "stats", // Adding stats as the first option since it's in the data
              "intervention_breakdown",
              "interventions",
              "interventionBreakdown",
              "intervention_data",
              "interventionData",
              "intervention_logs",
              "interventionLogs",
              "intervention_usage",
              "interventionUsage",
              "used_interventions",
              "usedInterventions",
            ];

            let interventionData = null;
            let foundField = null;

            // Find which field contains intervention data
            for (const field of possibleInterventionFields) {
              if (userData[field]) {
                if (field === "stats") {
                  // If it's stats, look for intervention-related data inside it
                  const statsData = userData[field];
                  const possibleStatsFields = ["intervention_breakdown"];

                  for (const statsField of possibleStatsFields) {
                    if (statsData[statsField]) {
                      interventionData = statsData[statsField];
                      foundField = `stats.${statsField}`;
                      console.log(
                        `Found intervention data in field '${foundField}' for user ${userDoc.id}:`,
                        interventionData,
                      );
                      break;
                    }
                  }

                  // If no specific intervention field found in stats, check if stats itself contains intervention data
                  if (!interventionData && Object.keys(statsData).length > 0) {
                    console.log(
                      `Checking if stats contains intervention data directly for user ${userDoc.id}`,
                    );
                    // Look for intervention-like keys in stats
                    const interventionLikeKeys = Object.keys(statsData).filter(
                      (key) =>
                        key.toLowerCase().includes("intervention") ||
                        key.toLowerCase().includes("breathing") ||
                        key.toLowerCase().includes("meditation") ||
                        key.toLowerCase().includes("exercise") ||
                        key.toLowerCase().includes("therapy"),
                    );

                    if (interventionLikeKeys.length > 0) {
                      interventionData = {};
                      interventionLikeKeys.forEach((key) => {
                        interventionData[key] = statsData[key];
                      });
                      foundField = "stats (intervention keys)";
                      console.log(
                        `Found intervention-like data in stats for user ${userDoc.id}:`,
                        interventionData,
                      );
                    }
                  }

                  if (interventionData) break;
                } else {
                  interventionData = userData[field];
                  foundField = field;
                  console.log(
                    `Found intervention data in field '${field}' for user ${userDoc.id}:`,
                    interventionData,
                  );
                  break;
                }
              }
            }

            if (interventionData) {
              // If intervention data is an array
              if (Array.isArray(interventionData)) {
                interventionData.forEach((intervention, index) => {
                  interventions.push({
                    id: `${userDoc.id}_${index}`,
                    userId: userDoc.id,
                    ...intervention,
                  });
                });
              }
              // If intervention data is an object with intervention types as keys
              else if (typeof interventionData === "object") {
                Object.entries(interventionData).forEach(([type, data]) => {
                  interventions.push({
                    id: `${userDoc.id}_${type}`,
                    userId: userDoc.id,
                    intervention_type: type,
                    count: typeof data === "number" ? data : 1,
                    ...data,
                  });
                });
              }
              // If intervention data is a simple value
              else {
                interventions.push({
                  id: `${userDoc.id}_${foundField}`,
                  userId: userDoc.id,
                  intervention_type: interventionData,
                  count: 1,
                });
              }
            } else {
              console.log(`No intervention data found for user ${userDoc.id}`);
            }
          });

          console.log(
            "Fetched interventions from user intervention_breakdown:",
            interventions.length,
            interventions,
          );
          return interventions;
        } catch (error) {
          console.error("Error fetching interventions from user data:", error);
          return [];
        }
      }

      // Function to get intervention breakdown by type
      async function getInterventionBreakdown() {
        try {
          const interventions = await getAllInterventions();
          const counts = {};

          interventions.forEach((intervention) => {
            const type =
              intervention.intervention_type || intervention.type || "Unknown";
            const count = intervention.count || 1;
            counts[type] = (counts[type] || 0) + count;
          });

          console.log("Intervention counts:", counts);

          return {
            counts: counts,
            totalInterventions: interventions.length,
            interventions: interventions,
          };
        } catch (error) {
          console.error("Error getting intervention breakdown:", error);
          return {
            counts: {},
            totalInterventions: 0,
            interventions: [],
          };
        }
      }
      async function getAllJournalEntries() {
        try {
          const journalEntries = [];

          // Get all users first
          const usersSnapshot = await db.collection("users").get();

          // For each user, get their journal entries
          const promises = [];
          usersSnapshot.forEach((userDoc) => {
            const promise = db
              .collection("users")
              .doc(userDoc.id)
              .collection("journal")
              .get()
              .then((journalSnapshot) => {
                journalSnapshot.forEach((journalDoc) => {
                  journalEntries.push({
                    id: journalDoc.id,
                    userId: userDoc.id,
                    ...journalDoc.data(),
                  });
                });
              });
            promises.push(promise);
          });

          await Promise.all(promises);
          console.log("Fetched journal entries:", journalEntries.length);

          return journalEntries;
        } catch (error) {
          console.error("Error fetching journal entries:", error);
          return [];
        }
      }

      // Function to get journal breakdown by type
      async function getJournalBreakdown() {
        try {
          const journalEntries = await getAllJournalEntries();
          const counts = {
            craving: 0,
            relapse: 0,
            near_miss: 0,
            milestone: 0,
          };

          journalEntries.forEach((entry) => {
            const type =
              entry.event_type?.toLowerCase() || entry.type?.toLowerCase();
            if (counts.hasOwnProperty(type)) {
              counts[type]++;
            }
          });

          return {
            counts: counts,
            totalEntries: journalEntries.length,
            entries: journalEntries,
          };
        } catch (error) {
          console.error("Error getting journal breakdown:", error);
          return {
            counts: {
              craving: 0,
              relapse: 0,
              near_miss: 0,
              milestone: 0,
            },
            totalEntries: 0,
            entries: [],
          };
        }
      }

      // Function to get analytics summary
      async function getAnalyticsSummary() {
        try {
          const [usersData, journalData] = await Promise.all([
            getUsersData(),
            getJournalBreakdown(),
          ]);

          // Calculate additional metrics
          const now = new Date();
          const sevenDaysAgo = new Date(
            now.getTime() - 7 * 24 * 60 * 60 * 1000,
          );
          const oneDayAgo = new Date(now.getTime() - 24 * 60 * 60 * 1000);

          // Active users (users with entries in last 7 days)
          const activeUsers = journalData.entries
            .filter((entry) => {
              const entryDate = entry.createdAt
                ? entry.createdAt.toDate
                  ? entry.createdAt.toDate()
                  : new Date(entry.createdAt)
                : new Date();
              return entryDate >= sevenDaysAgo;
            })
            .reduce((acc, entry) => {
              acc.add(entry.userId);
              return acc;
            }, new Set()).size;

          // Recent activity count (entries in last 24 hours)
          const recentActivity = journalData.entries.filter((entry) => {
            const entryDate = entry.createdAt
              ? entry.createdAt.toDate
                ? entry.createdAt.toDate()
                : new Date(entry.createdAt)
              : new Date();
            return entryDate >= oneDayAgo;
          }).length;

          // Milestone count
          const milestoneCount = journalData.counts.milestone;

          return {
            users: usersData,
            journal: journalData,
            summary: {
              totalUsers: usersData.totalUsers,
              totalJournalEntries: journalData.totalEntries,
              averageEntriesPerUser:
                usersData.totalUsers > 0
                  ? (journalData.totalEntries / usersData.totalUsers).toFixed(2)
                  : 0,
              milestoneCount: milestoneCount,
              activeUsers: activeUsers,
              recentActivity: recentActivity,
            },
          };
        } catch (error) {
          console.error("Error getting analytics summary:", error);
          return null;
        }
      }

      // Function to update dashboard with real data
      async function updateDashboard() {
        try {
          const analytics = await getAnalyticsSummary();

          if (analytics) {
            // Update user stats
            const totalUsersElement = document.getElementById("totalUsers");
            if (totalUsersElement) {
              totalUsersElement.textContent = analytics.summary.totalUsers;
            }

            // Update journal stats
            const totalEntriesElement = document.getElementById("totalEntries");
            if (totalEntriesElement) {
              totalEntriesElement.textContent =
                analytics.summary.totalJournalEntries;
            }

            // Update average entries
            const avgEntriesElement = document.getElementById("avgEntries");
            if (avgEntriesElement) {
              avgEntriesElement.textContent =
                analytics.summary.averageEntriesPerUser;
            }

            // Update milestone count
            const milestoneElement = document.getElementById("milestoneCount");
            if (milestoneElement) {
              milestoneElement.textContent = analytics.summary.milestoneCount;
            }

            // Update active users
            const activeUsersElement = document.getElementById("activeUsers");
            if (activeUsersElement) {
              activeUsersElement.textContent = analytics.summary.activeUsers;
            }

            // Update recent activity
            const recentActivityElement =
              document.getElementById("recentActivity");
            if (recentActivityElement) {
              recentActivityElement.textContent =
                analytics.summary.recentActivity;
            }

            console.log("Dashboard updated with real data:", analytics.summary);
          }
        } catch (error) {
          console.error("Error updating dashboard:", error);
        }
      }

      async function renderCharts() {
        const data = await getJournalBreakdown();
        const ctx = document.getElementById("journalChart");

        if (ctx) {
          // Destroy existing chart if it exists
          if (journalChartInstance) {
            journalChartInstance.destroy();
            journalChartInstance = null;
          }

          journalChartInstance = new Chart(ctx.getContext("2d"), {
            type: "doughnut",
            data: {
              labels: ["Cravings", "Relapses", "Near Miss", "Milestones"],
              datasets: [
                {
                  data: [
                    data.counts.craving,
                    data.counts.relapse,
                    data.counts.near_miss,
                    data.counts.milestone,
                  ],
                  backgroundColor: ["#e07a5f", "#dc3545", "#ffc107", "#5b7553"],
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: "bottom",
                  labels: {
                    padding: 20,
                    font: {
                      size: 12,
                    },
                  },
                },
                title: {
                  display: true,
                  text: `Journal Entries Breakdown (Total: ${data.totalEntries})`,
                  font: {
                    size: 16,
                  },
                },
              },
              interaction: {
                intersect: false,
              },
            },
          });
        }
      }

      async function renderInterventionChart() {
        const data = await getInterventionBreakdown();
        const ctx = document.getElementById("interventionChart");

        if (ctx && Object.keys(data.counts).length > 0) {
          // Destroy existing chart if it exists
          if (interventionChartInstance) {
            interventionChartInstance.destroy();
            interventionChartInstance = null;
          }

          const labels = Object.keys(data.counts);
          const values = Object.values(data.counts);
          const colors = [
            "#5b7553",
            "#e07a5f",
            "#d4a574",
            "#8faf85",
            "#6f42c1",
            "#20c997",
            "#fd7e14",
            "#dc3545",
            "#6610f2",
            "#0dcaf0",
          ];

          interventionChartInstance = new Chart(ctx.getContext("2d"), {
            type: "bar",
            data: {
              labels: labels,
              datasets: [
                {
                  label: "Usage Count",
                  data: values,
                  backgroundColor: colors.slice(0, labels.length),
                  borderColor: colors
                    .slice(0, labels.length)
                    .map((color) => color + "80"),
                  borderWidth: 2,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  display: false,
                },
                title: {
                  display: true,
                  text: `Total Interventions Used: ${data.totalInterventions}`,
                  font: {
                    size: 16,
                  },
                },
              },
              scales: {
                y: {
                  beginAtZero: true,
                  ticks: {
                    stepSize: 1,
                    font: {
                      size: 12,
                    },
                  },
                  grid: {
                    display: true,
                    color: "rgba(0,0,0,0.1)",
                  },
                },
                x: {
                  ticks: {
                    maxRotation: 45,
                    minRotation: 0,
                    font: {
                      size: 12,
                    },
                  },
                  grid: {
                    display: false,
                  },
                },
              },
              interaction: {
                intersect: false,
                mode: "index",
              },
            },
          });
        } else if (ctx) {
          // Show message if no intervention data
          ctx.getContext("2d").font = "16px Montserrat";
          ctx.getContext("2d").fillStyle = "#6b6b6b";
          ctx.getContext("2d").textAlign = "center";
          ctx
            .getContext("2d")
            .fillText(
              "No intervention data available",
              ctx.width / 2,
              ctx.height / 2,
            );
        }
      }
      async function initializeDashboard() {
        console.log("Initializing analytics dashboard...");
        await updateDashboard();
        await renderCharts();
        await renderInterventionChart();
        console.log("Dashboard initialization complete.");
      }

      // Initialize Lucide icons
      lucide.createIcons();

      // Enhanced initialization to handle loading states
      document.addEventListener("DOMContentLoaded", async function () {
        // Set loading states for all stats
        const statElements = [
          "totalUsers",
          "totalEntries",
          "avgEntries",
          "milestoneCount",
          "activeUsers",
          "recentActivity",
        ];

        statElements.forEach((elementId) => {
          const element = document.getElementById(elementId);
          if (element) element.textContent = "...";
        });

        try {
          // Initialize the dashboard
          await initializeDashboard();
        } catch (error) {
          console.error("Error initializing dashboard:", error);
          // Set error states
          statElements.forEach((elementId) => {
            const element = document.getElementById(elementId);
            if (element) {
              element.textContent = "Error";
              element.className += " error";
            }
          });
        }
      });
    </script>
  </body>
</html>

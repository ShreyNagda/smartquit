[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.partitions = huge_app.csv

build_flags =
    -O3
    -std=gnu++17
    -ffast-math
    -fno-exceptions
    -fno-rtti

lib_deps =
    tanakamasayuki/TensorFlowLite_ESP32
